# ルートA案（ブラー誘導 → BEN2 再α化）設定
# このファイルは pipelines/components/route_a_common.py の load_route_a_config() が読み込みます。
# 値はチューニング対象です（仕様書 A-4）。コードを変更せずここで調整してください。
#
# 処理フロー（per frame）:
#   入力フレーム I + SAM2.1 マスク M
#     → ① M を膨張させてゲート G を作る（毛先の逃げ代を確保）
#     → ② G の外を強ブラーして I' を作る（被写体はシャープ維持）
#     → ③ I' を BEN2 に通してソフト α を得る
#     → ④ ゲート境界帯へ α を合成し RGBA を出力
#
# BEN2 は mask 入力ポートを持たないため、ブラーで「どこに注目すべきか」を間接誘導します。

# ─────────────────────────────────────────
# alpha: 背景透過（α 生成）モデル
# ─────────────────────────────────────────
[alpha]
# BEN2 base の Hugging Face repo_id。BEN_Base.from_pretrained() がここから重みを取得します。
ben2_repo_id = "PramaLLC/BEN2"
# ローカル重みパス（既定: checkpoints/BEN2）。存在すればローカル重みを優先し、
# 無ければ Hugging Face から取得してこのディレクトリへ永続化する。
ben2_checkpoint_path = "checkpoints/BEN2"
# 毛先などの境界を精緻化する後処理。True は精度↑だが推論時間↑（既定 False）。
refine_foreground = false

# ─────────────────────────────────────────
# blur_guide: ブラー誘導パラメータ（①②）
# ─────────────────────────────────────────
[blur_guide]
# ① ゲート G を作る際の M の膨張量（px）。毛先の逃げ代。大きすぎると背景を巻き込む。
dilation_px = 24
# ② G 外に掛けるガウシアンブラーの kernel サイズ（奇数）。被写体を背景から際立たせる強さ。
blur_kernel = 41
# ② ガウシアンブラーの sigma。0 で kernel から自動計算。
blur_sigma = 0.0
# G 境界の羽根（feather）幅（px）。シャープ域とブラー域の遷移を滑らかにする。
feather_px = 12

# ─────────────────────────────────────────
# composite: 合成パラメータ（④⑤）
# ─────────────────────────────────────────
[composite]
# 合成経路。
#   "union"      ... フレームあたり BEN2 1 回。全対象を含む union ゲートで誘導する軽量経路（既定）。
#   "per_object" ... フレームあたり BEN2 N 回。対象ごとに誘導・推論し所有権で α 合成する忠実経路。
matte_mode = "union"
# True のとき最終 α に膨張ゲート G を乗算し、G 外の遠景誤検出を抑える（純ルートAは false=誘導のみ）。
gate_alpha = false
# SAM2 マスク M を α の「床」として加算的に合成し、BEN2 の α 抜け落ち（ちらつき）を補う。
#   "none"    ... 無効（既定）。BEN2 α をそのまま使う。
#   "screen"  ... 1-(1-α)(1-M)。柔らかく底上げ（境界が自然）。
#   "lighten" ... 画素ごと max(α, M)（= 比較明）。SAM2 が安定追跡している領域を確実に塗る。
# 前景ブラー/背景同系色で BEN2 saliency がフレーム毎に揺れる動画のちらつき抑制に有効。
# gate_alpha（α を絞る/減算的）とは逆向き（α を底上げ/加算的）。両者は併用可能だが目的が逆。
mask_floor_mode = "none"

# ─────────────────────────────────────────
# deva: DEVA 方式トラッカーのメモリ制御（gradio_app_sam2_ben2_route_a_deva_for_Movie.py 専用）
# ─────────────────────────────────────────
[deva]
# per_object_logits（OwnershipResolver が消費する soft guard 用 logit）の長辺上限（px）。
#   0          ... 縮小しない（原寸 float32 を全 frame 蓄積。基底アプリと同じ後方互換挙動）。
#   1024（既定）... 長辺を 1024px 以下へ縮小し host-RAM を抑える。
# ERR068: GroundingDINO が "person" を多数検出（例 19 box）し 4K 動画を処理すると、
# 原寸 float32 の per_object_logits を全 frame 蓄積して host-RAM が枯渇し
# numpy._ArrayMemoryError で 7 分後にクラッシュした。per_object_logits は最終 α ではなく
# 膨張＋ブラーされる低周波の soft guard のため、縮小しても実害は小さい（最終 α は BEN2 が原寸生成）。
# RAM が少ない環境ではさらに 512 へ下げると消費を半減できる。per_object 経路では原寸が必要なため
# アプリ側が自動的に 0 を渡す（この値は union 経路にのみ適用される）。
per_object_logits_max_side = 1024
